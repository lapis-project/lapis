packages:
  - "apps/*"

catalog:
  "@lucide/vue": ^1.21.0
  "@nuxt/eslint": ^1.16.0
  eslint: ^9.39.2
  nuxt: ^4.4.8
  vue: ^3.5.38
  tailwindcss: ^4.3.1
  typescript: ^6.0.2
  vite: ^7.3.5

# -------------------------
# Hoisting Rules
# -------------------------
publicHoistPattern:
  - "*@tailwindcss/vite*"
  - "@nuxtjs/mdc*"
  - "remark*"
  - "rehype*"
  - "unified*"
  - "unist*"
  - "parse5*"
  - "debug*"

# -------------------------
# Engine & Environment Settings
# -------------------------
engineStrict: true
pmOnFail: warn
shellEmulator: true

# -------------------------
# Security Policies
# -------------------------
# Enforce a 3-day (4320 minutes) cooldown period for all new packages
# 1 day = 1440, 3 days = 4320, 7 days = 10080
minimumReleaseAge: 4320
blockExoticSubdeps: true

# -------------------------
# Build Script Approvals
# -------------------------
allowBuilds:
  "@intlify/vue-i18n-bridge": true
  "@intlify/vue-router-bridge": true
  "@parcel/watcher": true
  "better-sqlite3": true
  "esbuild": true
  "sharp": true
  "simple-git-hooks": true
  "unrs-resolver": true
  "vue-demi": true
