services:
  database:
    image: postgres:18
    container_name: lapis-dev-database-1
    environment:
      - POSTGRES_PASSWORD=${PGPASSWORD}
      - POSTGRES_USER=${PGUSER}
      - POSTGRES_DB=${PGDATABASE}
      - PGPORT=${PGPORT}
    ports:
      - "${PGPORT}:${PGPORT}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-U", "${PGUSER}", "-d", "${PGDATABASE}"]
      interval: 30s
      timeout: 60s
      retries: 5
      start_period: 80s
